<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060709" />
    <title>Yapply Open Marketplace | Client Briefs and Professional Listings</title>
    <meta
      name="description"
      content="Explore Yapply Open Marketplace where clients publish construction briefs and architects, developers, and contractors share premium listings."
    />
    <meta
      name="keywords"
      content="Yapply open marketplace, construction listings Turkey, villa brief marketplace, architects Turkey listings, contractors Turkey"
    />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="./styles/tokens.css?v=20260325b" />
    <link rel="stylesheet" href="./styles/base.css?v=20260325b" />
    <link rel="stylesheet" href="./styles/components.css?v=20260325b" />
    <link rel="stylesheet" href="./styles/sections.css?v=20260325b" />
    <link rel="stylesheet" href="./styles/app-shell.css?v=20260325b" />

    <script>
      document.documentElement.dataset.theme = localStorage.getItem("yapply-theme") || "dark";
      // Detect Capacitor native app
      (function() {
        var origin = window.location.origin;
        var hostname = window.location.hostname;
        var port = window.location.port;
        var isNative = origin === "capacitor://localhost" || (hostname === "localhost" && !port);
        if (isNative) {
          document.documentElement.classList.add("has-tab-bar");
          // Prevent pinch-to-zoom
          document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
          document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
          // Sync bg color with theme
          var t = localStorage.getItem('yapply-theme') || 'dark';
          var bgc = t === 'light' ? '#f3efe6' : '#060709';
          document.documentElement.style.backgroundColor = bgc;
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.content = bgc;
        }
      })();
    
    </script>
  </head>
  <body data-page="open-marketplace">
    
    <div id="app"></div>
    <script type="module" src="./scripts/main.js?v=20260325-filter-fix"></script>
  </body>
</html>
