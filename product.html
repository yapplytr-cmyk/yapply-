<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060709" />
    <title>Lodos Atlası | Listing Detayı</title>
    <meta name="description" content="Çeşme satılık listing detaylarını iç galeri, yatırım skoru ve getiri senaryolarıyla inceleyin." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="./styles/app-shell.css" />

    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem("yapply-theme") || "dark";
        document.documentElement.dataset.loadingLocale = localStorage.getItem("yapply-locale") || "tr";
      } catch (error) {
        document.documentElement.dataset.theme = "dark";
        document.documentElement.dataset.loadingLocale = "tr";
      }
      // Detect Capacitor native app
      (function() {
        var origin = window.location.origin;
        var hostname = window.location.hostname;
        var port = window.location.port;
        var isNative = origin === "capacitor://localhost" || (hostname === "localhost" && !port);
        if (isNative) {
          document.documentElement.classList.add("has-tab-bar");
          // Prevent pinch-to-zoom
          document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
          document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
          // Sync bg color with theme
          var t = localStorage.getItem('yapply-theme') || 'dark';
          var bgc = t === 'light' ? '#f3efe6' : '#060709';
          document.documentElement.style.backgroundColor = bgc;
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.content = bgc;
        }
      })();
    </script>
  </head>
  <body data-page="product">
    
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true">
          <span class="logo-roof"></span>
          <span class="logo-body"></span>
          <span class="logo-door"></span>
          <span class="logo-bar logo-bar-a"></span>
          <span class="logo-bar logo-bar-b"></span>
          <span class="logo-bar logo-bar-c"></span>
        </span>
        <span class="brand-text">
          <strong>Lodos Atlası</strong>
          <small data-i18n="brand.subtitle">Çeşme gayrimenkul radarı</small>
        </span>
      </a>

      <nav class="site-nav" aria-label="Ana gezinme">
        <a href="index.html" data-i18n="nav.home">Anasayfa</a>
        <a href="shop.html" data-i18n="nav.listings">İlanlar</a>
        <a href="about.html" data-i18n="nav.methodology">Metodoloji</a>
        <a href="cart.html" data-i18n="nav.watchlist">İzleme Listesi</a>
        <a href="contact.html" data-i18n="nav.contact">İletişim</a>
      </nav>
    </header>

    <main class="shell">
      <section class="detail-shell reveal" data-listing-detail></section>

      <section class="reveal">
        <div class="section-heading">
          <p class="eyebrow" data-i18n="product.related.eyebrow">Benzer fırsatlar</p>
          <h2 data-i18n="product.related.title">Aynı ürün içinde kıyaslayabileceğiniz diğer seçili ilanlar.</h2>
        </div>
        <div class="listing-grid" data-related-listings></div>
      </section>
    </main>

    <footer class="site-footer shell">
      <p data-i18n="footer.product">Detay sayfaları kullanıcıyı ürün dışına taşımaz; görsel ve veri içeride okunur.</p>
      <a href="shop.html" data-i18n="product.allListings">Tüm İlanlar</a>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
