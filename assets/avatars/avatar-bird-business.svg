<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="bClip"><circle cx="200" cy="200" r="185"/></clipPath>
  </defs>
  <!-- Circle bg -->
  <circle cx="200" cy="200" r="185" fill="#dce8f0"/>
  <g clip-path="url(#bClip)">
    <!-- Office wall bg -->
    <rect x="0" y="0" width="400" height="400" fill="#dce8f0"/>
    <rect x="15" y="50" width="90" height="240" rx="3" fill="#b0c8d8" opacity="0.6"/>
    <rect x="20" y="55" width="80" height="115" rx="2" fill="#c8dae8" opacity="0.7"/>
    <rect x="20" y="175" width="80" height="110" rx="2" fill="#bcd0e0" opacity="0.6"/>
    <!-- Desk surface -->
    <rect x="0" y="310" width="400" height="100" fill="#c4a878" opacity="0.4"/>

    <!-- Contract paper -->
    <g transform="translate(275, 85) rotate(5)">
      <rect x="0" y="0" width="90" height="120" rx="3" fill="#f8f5ef" stroke="#bbb" stroke-width="1.5"/>
      <text x="8" y="20" font-family="sans-serif" font-size="10" font-weight="bold" fill="#555">CONTRACT</text>
      <line x1="8" y1="32" x2="82" y2="32" stroke="#ccc" stroke-width="1.2"/>
      <line x1="8" y1="44" x2="75" y2="44" stroke="#ddd" stroke-width="1"/>
      <line x1="8" y1="54" x2="70" y2="54" stroke="#ddd" stroke-width="1"/>
      <line x1="8" y1="64" x2="78" y2="64" stroke="#ddd" stroke-width="1"/>
      <line x1="8" y1="74" x2="60" y2="74" stroke="#ddd" stroke-width="1"/>
      <line x1="8" y1="100" x2="55" y2="100" stroke="#999" stroke-width="1"/>
      <path d="M10 96 Q16 88 22 94 Q28 100 34 90" fill="none" stroke="#555" stroke-width="1"/>
    </g>

    <!-- Bird body -->
    <ellipse cx="190" cy="280" rx="80" ry="70" fill="#e8823a" stroke="#444" stroke-width="2.5"/>
    <!-- Belly highlight -->
    <ellipse cx="190" cy="290" rx="50" ry="45" fill="#f0a060" opacity="0.4"/>

    <!-- Grey suit jacket -->
    <path d="M110 255 Q105 280 108 340 L272 340 Q275 280 270 255 Q240 235 190 235 Q140 235 110 255Z" fill="#6b6e78" stroke="#444" stroke-width="2"/>
    <!-- Lapel left -->
    <path d="M158 235 L135 295 L175 275Z" fill="#5d6068"/>
    <!-- Lapel right -->
    <path d="M222 235 L245 295 L205 275Z" fill="#5d6068"/>
    <!-- White shirt -->
    <path d="M168 235 L175 310 L205 310 L212 235Z" fill="#eae6de" stroke="#ccc" stroke-width="1"/>
    <!-- Tie -->
    <path d="M186 242 L182 300 L190 308 L198 300 L194 242Z" fill="#c9a84c" stroke="#a08030" stroke-width="1"/>
    <path d="M184 242 L190 250 L196 242Z" fill="#d4b458"/>

    <!-- Left wing/arm (gesturing) -->
    <path d="M110 260 Q75 270 80 300 Q85 315 105 310 Q100 290 110 280" fill="#d67030" stroke="#444" stroke-width="2"/>
    <!-- Wing feather lines -->
    <path d="M90 280 Q85 290 92 300" fill="none" stroke="#c06028" stroke-width="1.5"/>

    <!-- Right wing -->
    <ellipse cx="275" cy="280" rx="20" ry="40" fill="#d67030" stroke="#444" stroke-width="2"/>

    <!-- Head -->
    <circle cx="195" cy="160" r="62" fill="#e8823a" stroke="#444" stroke-width="2.5"/>

    <!-- Head feather tuft -->
    <path d="M195 98 Q200 85 210 95" fill="#d67030" stroke="#444" stroke-width="2" stroke-linecap="round"/>
    <path d="M205 95 Q212 80 218 92" fill="#d67030" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Eye white -->
    <ellipse cx="180" cy="150" rx="18" ry="20" fill="#fff" stroke="#444" stroke-width="2"/>
    <!-- Eye pupil -->
    <circle cx="185" cy="148" r="11" fill="#222"/>
    <!-- Eye highlight -->
    <circle cx="190" cy="143" r="5" fill="#fff"/>
    <circle cx="183" cy="153" r="2.5" fill="#fff" opacity="0.5"/>

    <!-- Happy mouth/cheek -->
    <path d="M165 172 Q172 180 180 175" fill="none" stroke="#c06028" stroke-width="2" stroke-linecap="round"/>

    <!-- Beak -->
    <path d="M232 155 L270 148 L255 175Z" fill="#f0a030" stroke="#444" stroke-width="2"/>
    <!-- Beak line -->
    <path d="M232 162 L260 160" fill="none" stroke="#d08020" stroke-width="1.5"/>
    <!-- Open beak bottom -->
    <path d="M235 168 L260 172 L250 185Z" fill="#e09025" stroke="#444" stroke-width="1.5"/>

    <!-- Feet -->
    <g stroke="#e8823a" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M165 340 L160 375"/>
      <path d="M152 372 L160 375 L168 372"/>
      <path d="M215 340 L220 375"/>
      <path d="M212 372 L220 375 L228 372"/>
    </g>
  </g>
  <!-- Circle border -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#3a3a3a" stroke-width="4"/>
</svg>