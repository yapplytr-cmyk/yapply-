<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sClip"><circle cx="200" cy="200" r="185"/></clipPath>
  </defs>
  <!-- Circle bg -->
  <circle cx="200" cy="200" r="185" fill="#e0d8f0"/>
  <g clip-path="url(#sClip)">
    <!-- Outdoor/stadium bg -->
    <rect x="0" y="0" width="400" height="400" fill="#e0d8f0"/>
    <!-- Grass/field -->
    <rect x="0" y="300" width="400" height="110" fill="#a8c890" opacity="0.35"/>
    <!-- Field line -->
    <line x1="0" y1="312" x2="400" y2="312" stroke="#90b878" stroke-width="2" opacity="0.4"/>
    <!-- Stadium lights hint -->
    <circle cx="70" cy="55" r="35" fill="#fff" opacity="0.07"/>
    <circle cx="330" cy="65" r="28" fill="#fff" opacity="0.05"/>

    <!-- Trophy -->
    <g transform="translate(280, 80)">
      <path d="M22 12 L62 12 L57 55 L27 55Z" fill="#d4b458" stroke="#a08030" stroke-width="1.5"/>
      <rect x="32" y="55" width="20" height="14" fill="#c9a84c" stroke="#a08030" stroke-width="1"/>
      <rect x="27" y="69" width="30" height="6" rx="2" fill="#d4b458" stroke="#a08030" stroke-width="1"/>
      <!-- Handles -->
      <path d="M22 18 Q6 18 6 32 Q6 44 22 44" fill="none" stroke="#a08030" stroke-width="2.5"/>
      <path d="M62 18 Q78 18 78 32 Q78 44 62 44" fill="none" stroke="#a08030" stroke-width="2.5"/>
      <!-- Star -->
      <polygon points="42,20 45,30 55,30 47,36 50,46 42,40 34,46 37,36 29,30 39,30" fill="#f0d060" opacity="0.7"/>
    </g>

    <!-- Bird body -->
    <ellipse cx="190" cy="280" rx="80" ry="70" fill="#b060c8" stroke="#444" stroke-width="2.5"/>
    <!-- Belly highlight -->
    <ellipse cx="190" cy="290" rx="50" ry="45" fill="#c880d8" opacity="0.35"/>

    <!-- Athletic jacket - navy blue -->
    <path d="M110 255 Q105 280 108 340 L272 340 Q275 280 270 255 Q240 235 190 235 Q140 235 110 255Z" fill="#2a3a5c" stroke="#444" stroke-width="2"/>
    <!-- Gold stripe left -->
    <path d="M132 242 L122 340" stroke="#c9a84c" stroke-width="4.5" opacity="0.8"/>
    <!-- Gold stripe right -->
    <path d="M248 242 L258 340" stroke="#c9a84c" stroke-width="4.5" opacity="0.8"/>
    <!-- Zipper line -->
    <line x1="190" y1="242" x2="190" y2="340" stroke="#666" stroke-width="1.5"/>
    <!-- Collar -->
    <path d="M155 238 Q170 225 190 228 Q210 225 225 238" fill="#2a3a5c" stroke="#444" stroke-width="1.5"/>
    <!-- Gold collar accent -->
    <path d="M158 240 Q172 228 190 230 Q208 228 222 240" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
    <!-- Chest badge -->
    <circle cx="190" cy="285" r="14" fill="#c9a84c" stroke="#a08030" stroke-width="1.5"/>
    <text x="190" y="290" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2a3a5c" text-anchor="middle">Y</text>

    <!-- Left wing (raised, sporty) -->
    <path d="M110 260 Q68 235 62 268 Q58 298 92 305 Q86 278 102 265" fill="#a050b8" stroke="#444" stroke-width="2"/>
    <!-- Wing feather lines -->
    <path d="M76 262 Q68 278 78 292" fill="none" stroke="#9040a8" stroke-width="1.5"/>

    <!-- Right wing -->
    <ellipse cx="278" cy="275" rx="22" ry="42" fill="#a050b8" stroke="#444" stroke-width="2"/>

    <!-- Head -->
    <circle cx="195" cy="160" r="62" fill="#b060c8" stroke="#444" stroke-width="2.5"/>

    <!-- Head feather tuft (sporty mohawk style) -->
    <path d="M182 98 Q188 72 198 90" fill="#a050b8" stroke="#444" stroke-width="2" stroke-linecap="round"/>
    <path d="M193 90 Q200 65 212 86" fill="#a050b8" stroke="#444" stroke-width="2" stroke-linecap="round"/>
    <path d="M208 88 Q218 68 224 88" fill="#9040a8" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Sweatband -->
    <path d="M134 150 Q165 132 195 134 Q225 132 262 150" fill="none" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>

    <!-- Eye white -->
    <ellipse cx="178" cy="155" rx="19" ry="21" fill="#fff" stroke="#444" stroke-width="2"/>
    <!-- Eye pupil - determined look -->
    <circle cx="183" cy="153" r="12" fill="#222"/>
    <!-- Eye highlight -->
    <circle cx="188" cy="148" r="5" fill="#fff"/>
    <circle cx="181" cy="158" r="2.5" fill="#fff" opacity="0.5"/>
    <!-- Determined eyebrow -->
    <path d="M160 138 Q174 128 196 136" fill="none" stroke="#444" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Confident grin -->
    <path d="M165 178 Q176 190 188 182" fill="none" stroke="#8040a0" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Beak -->
    <path d="M232 155 L272 148 L257 175Z" fill="#f0a030" stroke="#444" stroke-width="2"/>
    <!-- Beak line -->
    <path d="M232 162 L262 160" fill="none" stroke="#d08020" stroke-width="1.5"/>

    <!-- Feet -->
    <g stroke="#b060c8" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M165 340 L160 375"/>
      <path d="M152 372 L160 375 L168 372"/>
      <path d="M215 340 L220 375"/>
      <path d="M212 372 L220 375 L228 372"/>
    </g>
  </g>
  <!-- Circle border -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#3a3a3a" stroke-width="4"/>
</svg>
