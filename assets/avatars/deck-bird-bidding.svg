<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Open Bidding bird - with dollar/price tag, blue -->
  <!-- Shadow -->
  <ellipse cx="100" cy="178" rx="42" ry="8" fill="#ccdff0" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="52" ry="50" fill="#5ba4d9"/>
  <ellipse cx="100" cy="118" rx="52" ry="50" fill="#6db8e8"/>
  <!-- Belly -->
  <ellipse cx="100" cy="132" rx="34" ry="30" fill="#d4ebfa"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="38" fill="#6db8e8"/>
  <!-- Cheeks -->
  <ellipse cx="78" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <ellipse cx="122" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <!-- Eyes - happy closed -->
  <path d="M84 68c4-6 10-6 14 0" stroke="#1e3a5a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M102 68c4-6 10-6 14 0" stroke="#1e3a5a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Beak -->
  <path d="M94 80l6 8 6-8" fill="#f5a623" stroke="#e8961e" stroke-width="1"/>
  <!-- Feet -->
  <path d="M82 168l-8 12M82 168l0 14M82 168l8 10" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <path d="M118 168l-8 10M118 168l0 14M118 168l8 12" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <!-- Wings holding up price tag -->
  <ellipse cx="54" cy="112" rx="14" ry="22" fill="#5ba4d9" transform="rotate(25 54 112)"/>
  <ellipse cx="146" cy="112" rx="14" ry="22" fill="#5ba4d9" transform="rotate(-25 146 112)"/>
  <!-- Price tag -->
  <g transform="translate(52, 38) rotate(-12)">
    <rect x="0" y="0" width="30" height="22" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
    <circle cx="6" cy="6" r="3" fill="none" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="14" y="16" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2d7ab3">$</text>
  </g>
  <!-- Sparkles around -->
  <path d="M148 52l2-6 2 6 6 2-6 2-2 6-2-6-6-2z" fill="#f5d76e"/>
  <path d="M42 100l1.5-4.5 1.5 4.5 4.5 1.5-4.5 1.5-1.5 4.5-1.5-4.5-4.5-1.5z" fill="#f5d76e"/>
</svg>
