<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Step 2 bird: holding a phone, looking at incoming bids -->
  <!-- Shadow -->
  <ellipse cx="100" cy="178" rx="42" ry="7" fill="#e0d4b8" opacity="0.35"/>
  <!-- Body -->
  <ellipse cx="100" cy="118" rx="42" ry="40" fill="#e8b84c"/>
  <!-- Belly -->
  <ellipse cx="100" cy="128" rx="28" ry="26" fill="#fef0c8"/>
  <!-- Head -->
  <circle cx="100" cy="62" r="32" fill="#e8b84c"/>
  <!-- Hair tufts -->
  <path d="M94 32c-2-9 3-14 6-11" stroke="#d4a43a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M104 31c0-10 5-13 7-9" stroke="#d4a43a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Cheeks -->
  <ellipse cx="78" cy="70" rx="9" ry="6" fill="#f5c4c0" opacity="0.5"/>
  <ellipse cx="122" cy="70" rx="9" ry="6" fill="#f5c4c0" opacity="0.5"/>
  <!-- Eyes - looking at phone (glancing right/down) -->
  <g class="step-bird__eyes">
    <ellipse cx="88" cy="58" rx="6.5" ry="7" fill="white"/>
    <ellipse cx="112" cy="58" rx="6.5" ry="7" fill="white"/>
    <circle cx="91" cy="60" r="3.8" fill="#2d4a3e"/>
    <circle cx="115" cy="60" r="3.8" fill="#2d4a3e"/>
    <circle cx="92" cy="59" r="1.3" fill="white"/>
    <circle cx="116" cy="59" r="1.3" fill="white"/>
  </g>
  <!-- Beak - small surprised/happy -->
  <path d="M95 72l5 7 5-7" fill="#f5a623" stroke="#e8961e" stroke-width="0.8"/>
  <!-- Happy smile -->
  <path d="M92 78c4 4 12 4 16 0" stroke="#9a7a2a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Left wing at side -->
  <ellipse cx="56" cy="112" rx="13" ry="20" fill="#d4a43a" transform="rotate(15 56 112)"/>
  <!-- Right wing holding phone up -->
  <g class="step-bird__wings">
    <ellipse cx="148" cy="96" rx="13" ry="20" fill="#d4a43a" transform="rotate(-35 148 96)"/>
    <!-- Phone -->
    <g class="step-bird__phone">
      <rect x="148" y="68" width="24" height="40" rx="4" fill="#2d4a3e"/>
      <rect x="151" y="72" width="18" height="30" rx="2" fill="#3a5a6a"/>
      <!-- Notification dots on phone -->
      <circle cx="156" cy="79" r="2.5" fill="#8ed4ae"/>
      <circle cx="163" cy="79" r="2.5" fill="#c9a84c"/>
      <rect x="154" y="85" width="12" height="2" rx="1" fill="#6ab8d4" opacity="0.7"/>
      <rect x="154" y="90" width="9" height="2" rx="1" fill="#6ab8d4" opacity="0.5"/>
      <rect x="154" y="95" width="11" height="2" rx="1" fill="#8ed4ae" opacity="0.5"/>
    </g>
  </g>
  <!-- Feet -->
  <path d="M82 156l-6 14M82 156l1 16M82 156l7 12" stroke="#e8961e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M118 156l-7 12M118 156l-1 16M118 156l6 14" stroke="#e8961e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Notification sparkle above phone -->
  <g class="step-bird__notif">
    <path d="M170 58l1.5-4 1.5 4 4 1.5-4 1.5-1.5 4-1.5-4-4-1.5z" fill="#f5d76e"/>
    <path d="M155 52l1-3 1 3 3 1-3 1-1 3-1-3-3-1z" fill="#8ed4ae"/>
  </g>
</svg>
