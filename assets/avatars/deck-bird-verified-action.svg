<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Verified bird ACTION: holding up a certificate/diploma proudly -->
  <ellipse cx="100" cy="178" rx="42" ry="8" fill="#d0e8df" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="52" ry="50" fill="#8ed4ae"/>
  <!-- Belly -->
  <ellipse cx="100" cy="132" rx="34" ry="30" fill="#d4f0e0"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="38" fill="#8ed4ae"/>
  <!-- Graduation cap -->
  <polygon points="60,52 100,36 140,52 100,62" fill="#2d4a3e"/>
  <rect x="96" y="36" width="8" height="4" rx="2" fill="#2d4a3e"/>
  <line x1="140" y1="52" x2="146" y2="66" stroke="#c9a84c" stroke-width="2"/>
  <circle cx="146" cy="68" r="3" fill="#c9a84c"/>
  <!-- Cheeks -->
  <ellipse cx="78" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <ellipse cx="122" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <!-- Eyes - proud, slightly closed -->
  <path d="M84 70c4-7 10-7 14 0" stroke="#2d4a3e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M102 70c4-7 10-7 14 0" stroke="#2d4a3e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Beak - open smile -->
  <path d="M94 80l6 9 6-9" fill="#f5a623" stroke="#e8961e" stroke-width="1"/>
  <!-- Big proud smile -->
  <path d="M90 88c5 5 15 5 20 0" stroke="#3d6e34" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Feet -->
  <path d="M82 168l-8 12M82 168l0 14M82 168l8 10" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <path d="M118 168l-8 10M118 168l0 14M118 168l8 12" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <!-- Left wing raised holding certificate -->
  <ellipse cx="50" cy="100" rx="14" ry="22" fill="#7ec8a0" transform="rotate(40 50 100)"/>
  <!-- Right wing raised -->
  <ellipse cx="150" cy="108" rx="14" ry="22" fill="#7ec8a0" transform="rotate(-20 150 108)"/>
  <!-- Certificate held up -->
  <g transform="translate(20, 78) rotate(-15)">
    <rect x="0" y="0" width="40" height="30" rx="3" fill="#fffbe6" stroke="#c9a84c" stroke-width="1.5"/>
    <line x1="8" y1="10" x2="32" y2="10" stroke="#c9a84c" stroke-width="1.5"/>
    <line x1="12" y1="16" x2="28" y2="16" stroke="#e8d48a" stroke-width="1"/>
    <circle cx="20" cy="24" r="4" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <path d="M18 24l2 2 4-4" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Sparkles -->
  <path d="M150 48l2-5 2 5 5 2-5 2-2 5-2-5-5-2z" fill="#f5d76e"/>
  <path d="M50 130l1.5-4 1.5 4 4 1.5-4 1.5-1.5 4-1.5-4-4-1.5z" fill="#f5d76e"/>
</svg>
