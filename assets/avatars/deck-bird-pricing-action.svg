<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Pricing bird ACTION: comparing prices with balanced scales, thumbs up -->
  <ellipse cx="100" cy="178" rx="42" ry="8" fill="#f0d8cc" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="52" ry="50" fill="#f09872"/>
  <!-- Belly -->
  <ellipse cx="100" cy="132" rx="34" ry="30" fill="#fce4d4"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="38" fill="#f09872"/>
  <!-- Cheeks -->
  <ellipse cx="78" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.6"/>
  <ellipse cx="122" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.6"/>
  <!-- Eyes - winking with confidence -->
  <circle cx="88" cy="68" r="5" fill="#fff"/>
  <circle cx="89" cy="69" r="3" fill="#3d2418"/>
  <circle cx="87" cy="67" r="1.2" fill="#fff"/>
  <path d="M106 68c4-6 10-6 14 0" stroke="#3d2418" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Beak -->
  <path d="M94 80l6 9 6-9" fill="#f5a623" stroke="#e8961e" stroke-width="1"/>
  <!-- Big confident grin -->
  <path d="M88 88c6 6 18 6 24 0" stroke="#8b4530" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Feet -->
  <path d="M82 168l-8 12M82 168l0 14M82 168l8 10" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <path d="M118 168l-8 10M118 168l0 14M118 168l8 12" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <!-- Left wing thumbs up -->
  <ellipse cx="48" cy="105" rx="14" ry="22" fill="#e8845c" transform="rotate(30 48 105)"/>
  <!-- Thumbs up gesture -->
  <g transform="translate(28, 82) rotate(-10)">
    <rect x="0" y="8" width="14" height="12" rx="4" fill="#f5c8a0"/>
    <rect x="3" y="0" width="8" height="18" rx="4" fill="#f5c8a0"/>
  </g>
  <!-- Right wing -->
  <ellipse cx="150" cy="108" rx="14" ry="22" fill="#e8845c" transform="rotate(-20 150 108)"/>
  <!-- Balanced scale above -->
  <g transform="translate(60, 20)">
    <line x1="40" y1="4" x2="40" y2="14" stroke="#c9a84c" stroke-width="2.5"/>
    <polygon points="40,2 36,6 44,6" fill="#c9a84c"/>
    <line x1="14" y1="14" x2="66" y2="14" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left pan -->
    <line x1="14" y1="14" x2="14" y2="24" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M4 24q10 7 20 0" stroke="#c9a84c" stroke-width="2" fill="none"/>
    <text x="14" y="22" font-family="sans-serif" font-size="8" fill="#c9a84c" text-anchor="middle">$</text>
    <!-- Right pan (balanced) -->
    <line x1="66" y1="14" x2="66" y2="24" stroke="#c9a84c" stroke-width="1.5"/>
    <path d="M56 24q10 7 20 0" stroke="#c9a84c" stroke-width="2" fill="none"/>
    <text x="66" y="22" font-family="sans-serif" font-size="8" fill="#c9a84c" text-anchor="middle">$</text>
  </g>
  <!-- Sparkles -->
  <path d="M160 50l2-5 2 5 5 2-5 2-2 5-2-5-5-2z" fill="#f5d76e"/>
  <path d="M34 130l1.5-4 1.5 4 4 1.5-4 1.5-1.5 4-1.5-4-4-1.5z" fill="#f5d76e"/>
</svg>
