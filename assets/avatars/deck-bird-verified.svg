<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Verified Professionals bird - clipboard & checkmark, teal/mint -->
  <!-- Shadow -->
  <ellipse cx="100" cy="178" rx="42" ry="8" fill="#d0e8df" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="52" ry="50" fill="#7ec8a0"/>
  <ellipse cx="100" cy="118" rx="52" ry="50" fill="#8ed4ae"/>
  <!-- Belly -->
  <ellipse cx="100" cy="132" rx="34" ry="30" fill="#d4f0e0"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="38" fill="#8ed4ae"/>
  <!-- Cheeks -->
  <ellipse cx="78" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <ellipse cx="122" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <!-- Eyes - happy closed -->
  <path d="M84 68c4-6 10-6 14 0" stroke="#2d4a3e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M102 68c4-6 10-6 14 0" stroke="#2d4a3e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Beak -->
  <path d="M94 80l6 8 6-8" fill="#f5a623" stroke="#e8961e" stroke-width="1"/>
  <!-- Feet -->
  <path d="M82 168l-8 12M82 168l0 14M82 168l8 10" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <path d="M118 168l-8 10M118 168l0 14M118 168l8 12" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <!-- Wings (small, cute) -->
  <ellipse cx="54" cy="115" rx="14" ry="22" fill="#7ec8a0" transform="rotate(15 54 115)"/>
  <ellipse cx="146" cy="115" rx="14" ry="22" fill="#7ec8a0" transform="rotate(-15 146 115)"/>
  <!-- Clipboard -->
  <rect x="128" y="90" width="28" height="36" rx="4" fill="#fff" stroke="#5ba37e" stroke-width="2"/>
  <rect x="134" y="86" width="16" height="8" rx="3" fill="#5ba37e"/>
  <path d="M136 102h14M136 110h10M136 118h12" stroke="#8ed4ae" stroke-width="2" stroke-linecap="round"/>
  <!-- Checkmark on clipboard -->
  <path d="M140 107l3 3 6-6" stroke="#2d8a5e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
