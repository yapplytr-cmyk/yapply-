<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Bidding bird ACTION: raising paddle to place a bid -->
  <ellipse cx="100" cy="178" rx="42" ry="8" fill="#ccdff0" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="52" ry="50" fill="#6db8e8"/>
  <!-- Belly -->
  <ellipse cx="100" cy="132" rx="34" ry="30" fill="#d4ebfa"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="38" fill="#6db8e8"/>
  <!-- Cheeks -->
  <ellipse cx="78" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <ellipse cx="122" cy="78" rx="10" ry="7" fill="#f5c4c0" opacity="0.5"/>
  <!-- Eyes - excited, open -->
  <circle cx="88" cy="68" r="6" fill="#fff"/>
  <circle cx="112" cy="68" r="6" fill="#fff"/>
  <circle cx="89" cy="69" r="3.5" fill="#1e3a5a"/>
  <circle cx="113" cy="69" r="3.5" fill="#1e3a5a"/>
  <circle cx="87" cy="67" r="1.5" fill="#fff"/>
  <circle cx="111" cy="67" r="1.5" fill="#fff"/>
  <!-- Beak open - excited -->
  <path d="M94 80l6 10 6-10" fill="#f5a623" stroke="#e8961e" stroke-width="1"/>
  <!-- Big smile -->
  <path d="M90 90c5 4 15 4 20 0" stroke="#2d5a8a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Feet -->
  <path d="M82 168l-8 12M82 168l0 14M82 168l8 10" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <path d="M118 168l-8 10M118 168l0 14M118 168l8 12" stroke="#e8961e" stroke-width="3" stroke-linecap="round"/>
  <!-- Left wing down -->
  <ellipse cx="54" cy="115" rx="14" ry="22" fill="#5ba4d9" transform="rotate(15 54 115)"/>
  <!-- Right wing raised high holding paddle -->
  <ellipse cx="148" cy="90" rx="14" ry="24" fill="#5ba4d9" transform="rotate(-40 148 90)"/>
  <!-- Auction paddle -->
  <g transform="translate(155, 30) rotate(15)">
    <rect x="-3" y="20" width="6" height="30" rx="3" fill="#8b6b42"/>
    <rect x="-14" y="0" width="28" height="22" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="1" y="16" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2d7ab3" text-anchor="middle">BID</text>
  </g>
  <!-- Motion lines showing paddle raised -->
  <line x1="168" y1="44" x2="178" y2="38" stroke="#4a90c4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="170" y1="54" x2="182" y2="52" stroke="#4a90c4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Sparkles -->
  <path d="M40 50l2-5 2 5 5 2-5 2-2 5-2-5-5-2z" fill="#f5d76e"/>
</svg>
