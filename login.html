<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yapply | Login</title>
    <meta
      name="description"
      content="Login to Yapply through a premium frontend entry flow prepared for future client, developer, and moderator access."
    />
    <meta
      name="keywords"
      content="Yapply login, marketplace login, developer login, client login, admin login"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Sora:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/tokens.css?v=20260312-supabase-auth" />
    <link rel="stylesheet" href="./styles/base.css?v=20260312-supabase-auth" />
    <link rel="stylesheet" href="./styles/components.css?v=20260312-supabase-auth" />
    <link rel="stylesheet" href="./styles/sections.css?v=20260312-supabase-auth" />
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem("yapply-theme") || "dark";
        document.documentElement.dataset.loadingLocale = localStorage.getItem("yapply-locale") || "tr";
      } catch (error) {
        document.documentElement.dataset.theme = "dark";
        document.documentElement.dataset.loadingLocale = "tr";
      }
    </script>
  </head>
  <body data-page="login">
    <div id="app">
      <div class="page-shell">
        <main class="section-shell">
          <div class="panel application-panel application-panel--loading">
            <div class="app-loader" aria-live="polite">
              <p class="app-loader__brand">Yapply</p>
              <div class="app-loader__bird" aria-hidden="true">
                <svg class="loading-bird" viewBox="0 0 120 120" fill="none">
                  <ellipse class="loading-bird__shadow" cx="60" cy="95" rx="19" ry="5"></ellipse>
                  <g class="loading-bird__bob">
                    <path class="loading-bird__tail" d="M32 63 21 58 30 71 38 67Z"></path>
                    <ellipse class="loading-bird__body" cx="52" cy="62" rx="23" ry="18"></ellipse>
                    <circle class="loading-bird__head" cx="73" cy="49" r="13"></circle>
                    <ellipse class="loading-bird__wing" cx="49" cy="63" rx="11" ry="15" transform="rotate(-24 49 63)"></ellipse>
                    <circle class="loading-bird__eye" cx="77" cy="46" r="2.3"></circle>
                    <path class="loading-bird__beak" d="M84 49 94 45 87 54Z"></path>
                    <path class="loading-bird__leg" d="M49 79V88"></path>
                    <path class="loading-bird__leg" d="M58 79V88"></path>
                    <g class="loading-bird__tool">
                      <rect class="loading-bird__pencil" x="66" y="71" width="30" height="5" rx="2.5" transform="rotate(-22 66 71)"></rect>
                      <rect class="loading-bird__pencil-eraser" x="66" y="71" width="6" height="5" rx="1.2" transform="rotate(-22 66 71)"></rect>
                      <path class="loading-bird__pencil-tip" d="M96 59 103 56 100 64Z"></path>
                    </g>
                  </g>
                </svg>
              </div>
              <p class="app-loader__text">
                <span class="app-loader__text-tr">Hazırlanıyor...</span>
                <span class="app-loader__text-en">Preparing...</span>
              </p>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="./scripts/main.js?v=20260312-public-auth-backend"></script>
  </body>
</html>
