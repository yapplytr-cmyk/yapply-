<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />

  <body data-page="watchlist">
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true">
          <span class="logo-roof"></span>
          <span class="logo-body"></span>
          <span class="logo-door"></span>
          <span class="logo-bar logo-bar-a"></span>
          <span class="logo-bar logo-bar-b"></span>
          <span class="logo-bar logo-bar-c"></span>
        </span>
        <span class="brand-text">
          <strong>Lodos Atlası</strong>
          <small data-i18n="brand.subtitle">Çeşme gayrimenkul radarı</small>
        </span>
      </a>

      <nav class="site-nav" aria-label="Ana gezinme">
        <a href="index.html" data-i18n="nav.home">Anasayfa</a>
        <a href="shop.html" data-i18n="nav.listings">İlanlar</a>

    <main class="shell">

        <p class="eyebrow" data-i18n="watchlist.hero.eyebrow">İzleme listesi</p>
        <h1 data-i18n="watchlist.hero.title">Kaydettiğiniz ilanları tek yerde tekrar karşılaştırın.</h1>

          Kart üzerindeki kaydet düğmesiyle seçtiğiniz ilanlar burada tutulur.
        </p>
      </section>

      <section class="listing-grid reveal" data-watchlist></section>
    </main>

    <footer class="site-footer shell">
      <p data-i18n="footer.watchlist">İzleme listesi tarayıcı içinde saklanır.</p>
      <a href="shop.html" data-i18n="nav.listings">İlanlar</a>

    <script src="app.js"></script>
